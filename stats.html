<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>数据看板 · dev-home</title>
<meta http-equiv="refresh" content="60">
<style>
:root{--bg:#F8F6F2;--card:#fff;--text:#222;--dim:#888;--green:#3a8;--blue:#48e;--radius:12px}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;padding:40px 20px}
.container{max-width:800px;margin:0 auto}
h1{text-align:center;margin-bottom:30px;font-size:28px}
.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:16px;margin-bottom:30px}
.card{background:var(--card);padding:24px;border-radius:var(--radius);box-shadow:0 2px 12px rgba(0,0,0,.08)}
.card-label{font-size:13px;color:var(--dim);margin-bottom:4px}
.card-num{font-size:36px;font-weight:700;color:var(--text)}
.card-num.green{color:var(--green)}
.card-num.blue{color:var(--blue)}
.section{margin-bottom:30px}
.section h2{font-size:18px;margin-bottom:12px;padding-bottom:8px;border-bottom:2px solid var(--green)}
.table{width:100%;border-collapse:collapse}
.table th,.table td{padding:10px 14px;text-align:left;border-bottom:1px solid #eee}
.table th{font-size:12px;color:var(--dim);text-transform:uppercase}
.table td{font-size:14px}
.bar{display:inline-block;height:16px;background:var(--blue);border-radius:4px;min-width:4px;transition:width .5s}
.updated{text-align:center;color:var(--dim);font-size:12px;margin-top:30px}
</style>
</head>
<body>
<div class="container">
<h1>📊 dev-home 数据看板</h1>
<div class="cards" id="cards"></div>
<div class="section">
  <h2>📄 页面访问</h2>
  <table class="table"><thead><tr><th>页面</th><th>访问量</th><th>占比</th></tr></thead><tbody id="pageTable"></tbody></table>
</div>
<div class="section">
  <h2>📅 每日趋势</h2>
  <table class="table"><thead><tr><th>日期</th><th>访问量</th></tr></thead><tbody id="dayTable"></tbody></table>
</div>
<div class="updated" id="updated"></div>
</div>
<script>
'use strict';
(async()=>{
  try{
    const stats = await fetch('/api/stats').then(r=>r.json());
    const total = stats.total || 0;
    const pages = Object.entries(stats.pages||{}).sort((a,b)=>b[1]-a[1]);
    const days = Object.entries(stats.days||{}).sort((a,b)=>b[0].localeCompare(a[0])).slice(-14);
    
    document.getElementById('cards').innerHTML = [
      {label:'总访问量',num:total,cls:'green'},
      {label:'页面数',num:Object.keys(stats.pages||{}).length,cls:'blue'},
      {label:'今日',num:stats.days[new Date().toISOString().slice(0,10)]||0,cls:''}
    ].map(c=>`<div class="card"><div class="card-label">${c.label}</div><div class="card-num ${c.cls}">${c.num.toLocaleString()}</div></div>`).join('');
    
    const maxPage = pages[0]?.[1] || 1;
    document.getElementById('pageTable').innerHTML = pages.map(([p,n])=>`<tr><td>${p}</td><td>${n.toLocaleString()}</td><td><span class="bar" style="width:${Math.max(n/maxPage*200,4)}px"></span> ${Math.round(n/total*100)||0}%</td></tr>`).join('');
    
    document.getElementById('dayTable').innerHTML = days.map(([d,n])=>`<tr><td>${d}</td><td>${n.toLocaleString()}</td></tr>`).join('');
    
    document.getElementById('updated').textContent = `更新于 ${new Date().toLocaleString('zh-CN')} · 每60秒自动刷新`;
  }catch(e){ document.body.innerHTML = '<p style="text-align:center;padding:100px">加载失败: '+e.message+'</p>'; }
})();
</script>
</body>
</html>
