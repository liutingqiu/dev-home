<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop All — ATLAS</title>
<meta name="description" content="Shop the full ATLAS collection — dresses, tops, bottoms and outerwear crafted from premium materials. Free shipping on orders over $200.">
<meta property="og:title" content="Shop All — ATLAS">
<meta property="og:description" content="Discover the full ATLAS collection of contemporary womenswear.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="logo">ATLAS</a>
    <nav class="nav-links">
      <a href="shop.html" class="active">Shop</a>
      <a href="shop.html?category=dresses">Dresses</a>
      <a href="shop.html?category=tops">Tops</a>
      <a href="shop.html?category=bottoms">Bottoms</a>
      <a href="shop.html?category=outerwear">Outerwear</a>
    </nav>
    <div class="header-icons">
      <a href="cart.html" style="position:relative;font-size:1.2rem;" aria-label="Shopping cart">
        &#128722; <span class="cart-count"></span>
      </a>
    </div>
  </div>
</header>

<main class="container">
  <div class="shop-layout">
    <!-- Sidebar Filters -->
    <aside class="shop-sidebar">
      <div class="filter-group">
        <h4>Category</h4>
        <div id="category-filters"></div>
      </div>
      <div class="filter-group">
        <h4>Size</h4>
        <div id="size-filters"></div>
      </div>
      <div class="filter-group">
        <h4>Price</h4>
        <label><input type="radio" name="price" value="" checked> All Prices</label>
        <label><input type="radio" name="price" value="0-100"> Under $100</label>
        <label><input type="radio" name="price" value="100-200"> $100 — $200</label>
        <label><input type="radio" name="price" value="200-500"> $200+</label>
      </div>
      <button class="btn btn-outline btn-sm" id="clear-filters" style="margin-top:8px;width:100%;">Clear All</button>
    </aside>

    <!-- Product Grid -->
    <div class="shop-main">
      <div class="shop-toolbar">
        <span id="result-count"></span>
        <select id="sort-select">
          <option value="featured">Sort by: Featured</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="name">Name: A — Z</option>
        </select>
      </div>
      <div class="product-grid" id="shop-grid"></div>
    </div>
  </div>
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-col">
      <h4>About ATLAS</h4>
      <p>ATLAS is a contemporary womenswear label dedicated to refined essentials.</p>
    </div>
    <div class="footer-col">
      <h4>Customer Care</h4>
      <a href="#">Shipping & Returns</a>
      <a href="#">Size Guide</a>
      <a href="#">Contact Us</a>
    </div>
    <div class="footer-col">
      <h4>Connect</h4>
      <a href="#">Instagram</a>
      <a href="#">Pinterest</a>
    </div>
  </div>
  <div class="footer-bottom">
    <p>&copy; 2026 ATLAS. All rights reserved.</p>
  </div>
</footer>

<script src="js/data.js"></script>
<script src="js/cart.js"></script>
<script>
(() => {
  'use strict';

  // Parse URL params
  const params = new URLSearchParams(location.search);
  let activeCategory = params.get('category') || '';

  // Build category filters
  const allCatLabel = activeCategory
    ? `<label class="selected"><input type="radio" name="category" value="" checked> All</label>`
    : `<label class="selected"><input type="radio" name="category" value="" checked> All Categories</label>`;
  document.getElementById('category-filters').innerHTML = allCatLabel +
    CATEGORIES.map(c => {
      const checked = activeCategory === c.id ? ' checked' : '';
      const sel = activeCategory === c.id ? ' class="selected"' : '';
      return `<label${sel}><input type="radio" name="category" value="${c.id}"${checked}> ${c.name}</label>`;
    }).join('');

  // Build size filters
  const allSizes = [...new Set(PRODUCTS.flatMap(p => p.sizes))].sort();
  document.getElementById('size-filters').innerHTML = allSizes.map(s =>
    `<label><input type="checkbox" name="size" value="${s}"> ${s}</label>`
  ).join('');

  function getSelectedFilters() {
    const catRadio = document.querySelector('input[name="category"]:checked');
    const category = catRadio ? catRadio.value : '';
    const priceRadio = document.querySelector('input[name="price"]:checked');
    const priceVal = priceRadio ? priceRadio.value : '';
    const sizeChecks = document.querySelectorAll('input[name="size"]:checked');
    const sizes = Array.from(sizeChecks).map(cb => cb.value);

    let minPrice = null, maxPrice = null;
    if (priceVal === '0-100') { maxPrice = 100; }
    else if (priceVal === '100-200') { minPrice = 100; maxPrice = 200; }
    else if (priceVal === '200-500') { minPrice = 200; }

    return { category: category || null, minPrice, maxPrice, sizes };
  }

  function getSortFn(sort) {
    switch (sort) {
      case 'price-asc': return (a, b) => a.price - b.price;
      case 'price-desc': return (a, b) => b.price - a.price;
      case 'name': return (a, b) => a.name.localeCompare(b.name);
      default: return () => 0; // featured — keep original order
    }
  }

  function render() {
    const filters = getSelectedFilters();
    const sort = document.getElementById('sort-select').value;
    let results = filterProducts(filters);
    results.sort(getSortFn(sort));

    document.getElementById('result-count').textContent = `${results.length} product${results.length !== 1 ? 's' : ''}`;

    document.getElementById('shop-grid').innerHTML = results.map(p => `
      <div class="product-card" onclick="location.href='product.html?id=${p.id}'" role="button" tabindex="0" aria-label="${p.name} — $${p.price}">
        <div class="card-image">
          <div class="placeholder-img">${p.name}</div>
          ${p.newArrival ? '<span style="position:absolute;top:10px;left:10px;background:var(--accent);color:#fff;font-size:0.65rem;padding:3px 8px;letter-spacing:1px;text-transform:uppercase;">New</span>' : ''}
        </div>
        <div class="card-name">${p.name}</div>
        <div class="card-price">$${p.price.toFixed(2)}</div>
      </div>
    `).join('');
  }

  // Event listeners
  document.querySelectorAll('input[name="category"], input[name="price"], input[name="size"]').forEach(el => {
    el.addEventListener('change', render);
  });
  document.getElementById('sort-select').addEventListener('change', render);
  document.getElementById('clear-filters').addEventListener('click', () => {
    document.querySelectorAll('input[name="category"]').forEach(r => r.checked = r.value === '');
    document.querySelectorAll('input[name="price"]').forEach(r => r.checked = r.value === '');
    document.querySelectorAll('input[name="size"]').forEach(cb => cb.checked = false);
    render();
  });

  // Initial render
  render();
})();
</script>

</body>
</html>
