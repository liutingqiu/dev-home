<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Product — ATLAS</title>
<meta name="description" content="Shop ATLAS — contemporary womenswear crafted from premium materials.">
<meta property="og:title" content="ATLAS">
<meta property="og:description" content="Contemporary womenswear crafted from premium materials.">
<meta property="og:type" content="product">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="logo">ATLAS</a>
    <nav class="nav-links">
      <a href="shop.html">Shop</a>
      <a href="shop.html?category=dresses">Dresses</a>
      <a href="shop.html?category=tops">Tops</a>
      <a href="shop.html?category=bottoms">Bottoms</a>
      <a href="shop.html?category=outerwear">Outerwear</a>
    </nav>
    <div class="header-icons">
      <a href="cart.html" style="position:relative;font-size:1.2rem;" aria-label="Shopping cart">
        &#128722; <span class="cart-count"></span>
      </a>
    </div>
  </div>
</header>

<main class="container" id="product-container">
  <!-- Rendered by JS -->
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-col">
      <h4>About ATLAS</h4>
      <p>ATLAS is a contemporary womenswear label dedicated to refined essentials.</p>
    </div>
    <div class="footer-col">
      <h4>Customer Care</h4>
      <a href="#">Shipping & Returns</a>
      <a href="#">Size Guide</a>
      <a href="#">Contact Us</a>
    </div>
    <div class="footer-col">
      <h4>Connect</h4>
      <a href="#">Instagram</a>
      <a href="#">Pinterest</a>
    </div>
  </div>
  <div class="footer-bottom">
    <p>&copy; 2026 ATLAS. All rights reserved.</p>
  </div>
</footer>

<script src="js/data.js"></script>
<script src="js/cart.js"></script>
<script>
(() => {
  'use strict';

  const params = new URLSearchParams(location.search);
  const id = params.get('id');

  const product = getProduct(id);

  if (!product) {
    document.getElementById('product-container').innerHTML = `
      <div class="empty-cart">
        <h2>Product Not Found</h2>
        <p>The product you're looking for doesn't exist.</p>
        <a href="shop.html" class="btn btn-outline" style="margin-top:20px;display:inline-block;">Back to Shop</a>
      </div>`;
    document.title = 'Not Found — ATLAS';
  } else {
    document.title = `${product.name} — ATLAS`;
    document.querySelector('meta[name="description"]').content = product.description.slice(0, 155);
    renderProduct(product);
  }

  function renderProduct(p) {
    const cat = CATEGORIES.find(c => c.id === p.category);
    const container = document.getElementById('product-container');

    container.innerHTML = `
      <div class="product-detail">
        <!-- Gallery -->
        <div class="product-gallery">
          <div class="main-image">
            <div class="placeholder-img" style="font-size:0.9rem;">${p.name}</div>
          </div>
        </div>

        <!-- Info -->
        <div class="product-info">
          <div class="breadcrumb">
            <a href="shop.html">Shop</a> / <a href="shop.html?category=${p.category}">${cat ? cat.name : p.category}</a>
          </div>
          <h1>${p.name}</h1>
          <div class="price">$${p.price.toFixed(2)}</div>
          <div class="desc">${p.description}</div>

          <!-- Color -->
          <div class="option-group">
            <h4>Color: <span id="selected-color"></span></h4>
            <div class="option-btns" id="color-options"></div>
          </div>

          <!-- Size -->
          <div class="option-group">
            <h4>Size</h4>
            <div class="option-btns" id="size-options"></div>
          </div>

          <!-- Quantity -->
          <div class="quantity-row">
            <button class="qty-btn" id="qty-minus" aria-label="Decrease quantity">&minus;</button>
            <input type="number" class="qty-input" id="qty-input" value="1" min="1" max="10" readonly>
            <button class="qty-btn" id="qty-plus" aria-label="Increase quantity">+</button>
          </div>

          <!-- Add to Cart -->
          <button class="btn btn-primary btn-lg add-to-cart-btn" id="add-to-cart">
            Add to Cart
          </button>

          <!-- Details -->
          <div style="margin-top:36px;">
            <h4 style="font-family:var(--font-body);font-size:0.7rem;text-transform:uppercase;letter-spacing:2px;color:var(--text-secondary);margin-bottom:10px;">Details &amp; Care</h4>
            <ul style="font-size:0.85rem;color:var(--text-secondary);line-height:2;">
              ${p.details.map(d => `<li>&mdash; ${d}</li>`).join('')}
            </ul>
          </div>

          <!-- SKU -->
          <div style="margin-top:16px;font-size:0.7rem;color:var(--text-light);text-transform:uppercase;letter-spacing:1px;">
            Style: ${p.id.toUpperCase()}
          </div>
        </div>
      </div>`;

    // Initialize options
    let selectedColor = p.colors[0];
    let selectedSize = null;

    // Color buttons
    const colorContainer = document.getElementById('color-options');
    p.colors.forEach((c, i) => {
      const btn = document.createElement('button');
      btn.className = 'option-btn' + (i === 0 ? ' selected' : '');
      btn.textContent = c;
      btn.addEventListener('click', () => {
        colorContainer.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedColor = c;
        document.getElementById('selected-color').textContent = c;
        updateButton();
      });
      colorContainer.appendChild(btn);
    });
    document.getElementById('selected-color').textContent = selectedColor;

    // Size buttons
    const sizeContainer = document.getElementById('size-options');
    p.sizes.forEach(s => {
      const btn = document.createElement('button');
      btn.className = 'option-btn';
      btn.textContent = s;
      btn.addEventListener('click', () => {
        sizeContainer.querySelectorAll('.option-btn').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        selectedSize = s;
        updateButton();
      });
      sizeContainer.appendChild(btn);
    });

    // Quantity
    const qtyInput = document.getElementById('qty-input');
    let quantity = 1;
    document.getElementById('qty-minus').addEventListener('click', () => {
      if (quantity > 1) { quantity--; qtyInput.value = quantity; }
    });
    document.getElementById('qty-plus').addEventListener('click', () => {
      if (quantity < 10) { quantity++; qtyInput.value = quantity; }
    });

    function updateButton() {
      const btn = document.getElementById('add-to-cart');
      btn.disabled = !selectedSize;
      btn.textContent = selectedSize ? 'Add to Cart' : 'Select a Size';
    }

    // Add to cart
    document.getElementById('add-to-cart').addEventListener('click', () => {
      if (!selectedSize) return;
      addToCart(p.id, selectedColor, selectedSize, quantity);
      // Brief visual feedback
      const btn = document.getElementById('add-to-cart');
      btn.textContent = 'Added!';
      btn.style.background = 'var(--success)';
      setTimeout(() => {
        btn.textContent = 'Add to Cart';
        btn.style.background = '';
      }, 1500);
    });

    updateButton();
  }
})();
</script>

</body>
</html>
