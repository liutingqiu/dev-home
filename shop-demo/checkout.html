<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Checkout — ATLAS</title>
<meta name="description" content="Secure checkout at ATLAS. Complete your order with our encrypted payment system.">
<meta property="og:title" content="Checkout — ATLAS">
<meta property="og:description" content="Secure checkout at ATLAS.">
<meta property="og:type" content="website">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,500;0,600;1,400&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <a href="index.html" class="logo">ATLAS</a>
    <nav class="nav-links">
      <a href="shop.html">Shop</a>
      <a href="shop.html?category=dresses">Dresses</a>
      <a href="shop.html?category=tops">Tops</a>
      <a href="shop.html?category=bottoms">Bottoms</a>
      <a href="shop.html?category=outerwear">Outerwear</a>
    </nav>
    <div class="header-icons">
      <a href="cart.html" style="position:relative;font-size:1.2rem;" aria-label="Shopping cart">
        &#128722; <span class="cart-count"></span>
      </a>
    </div>
  </div>
</header>

<main class="container" id="checkout-main">
  <h1 style="margin: 32px 0 24px;">Checkout</h1>
  <div id="checkout-content"></div>
</main>

<footer class="site-footer">
  <div class="footer-inner">
    <div class="footer-col">
      <h4>About ATLAS</h4>
      <p>ATLAS is a contemporary womenswear label dedicated to refined essentials.</p>
    </div>
    <div class="footer-col">
      <h4>Customer Care</h4>
      <a href="#">Shipping & Returns</a>
      <a href="#">Size Guide</a>
      <a href="#">Contact Us</a>
    </div>
    <div class="footer-col">
      <h4>Connect</h4>
      <a href="#">Instagram</a>
      <a href="#">Pinterest</a>
    </div>
  </div>
  <div class="footer-bottom">
    <p>&copy; 2026 ATLAS. All rights reserved.</p>
  </div>
</footer>

<script src="js/data.js"></script>
<script src="js/cart.js"></script>
<script>
(() => {
  'use strict';

  const FREE_SHIPPING = 200;
  const cart = getCart();

  // Redirect if cart is empty
  if (cart.length === 0) {
    document.getElementById('checkout-content').innerHTML = `
      <div class="empty-cart">
        <h2>Your cart is empty</h2>
        <p>Add some items before checking out.</p>
        <a href="shop.html" class="btn btn-outline" style="margin-top:20px;display:inline-block;">Continue Shopping</a>
      </div>`;
  } else {
    renderCheckout();
  }

  function renderCheckout() {
    const subtotal = getCartTotal();
    const shipping = subtotal >= FREE_SHIPPING ? 0 : 12.00;
    const tax = subtotal * 0.08;
    const total = subtotal + shipping + tax;

    const cartItems = cart.map(item => {
      const p = getProduct(item.productId);
      return p ? { ...item, product: p } : null;
    }).filter(Boolean);

    document.getElementById('checkout-content').innerHTML = `
      <div class="checkout-layout">
        <!-- Checkout Form -->
        <div class="checkout-form">
          <form id="checkout-form" novalidate>

            <!-- Shipping Address -->
            <div class="form-section">
              <h3>Shipping Address</h3>
              <div class="form-row">
                <div class="form-field">
                  <label for="first-name">First Name *</label>
                  <input type="text" id="first-name" required placeholder="Jane">
                  <span class="error-msg">Required</span>
                </div>
                <div class="form-field">
                  <label for="last-name">Last Name *</label>
                  <input type="text" id="last-name" required placeholder="Doe">
                  <span class="error-msg">Required</span>
                </div>
              </div>
              <div class="form-field">
                <label for="email">Email Address *</label>
                <input type="email" id="email" required placeholder="jane@example.com">
                <span class="error-msg">Valid email required</span>
              </div>
              <div class="form-field">
                <label for="address">Street Address *</label>
                <input type="text" id="address" required placeholder="123 Main Street, Apt 4B">
                <span class="error-msg">Required</span>
              </div>
              <div class="form-row">
                <div class="form-field">
                  <label for="city">City *</label>
                  <input type="text" id="city" required placeholder="New York">
                  <span class="error-msg">Required</span>
                </div>
                <div class="form-field">
                  <label for="state">State / Province</label>
                  <input type="text" id="state" placeholder="NY">
                </div>
                <div class="form-field">
                  <label for="zip">ZIP / Postal Code *</label>
                  <input type="text" id="zip" required placeholder="10001">
                  <span class="error-msg">Required</span>
                </div>
              </div>
              <div class="form-field">
                <label for="country">Country *</label>
                <select id="country" required>
                  <option value="">Select country...</option>
                  <option value="US">United States</option>
                  <option value="GB">United Kingdom</option>
                  <option value="CA">Canada</option>
                  <option value="AU">Australia</option>
                  <option value="FR">France</option>
                  <option value="DE">Germany</option>
                  <option value="JP">Japan</option>
                  <option value="SG">Singapore</option>
                  <option value="AE">United Arab Emirates</option>
                </select>
                <span class="error-msg">Please select a country</span>
              </div>
            </div>

            <!-- Shipping Method -->
            <div class="form-section">
              <h3>Shipping Method</h3>
              <label style="display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;">
                <input type="radio" name="shipping-method" value="standard" checked>
                <div style="flex:1;">
                  <div style="font-weight:500;font-size:0.9rem;">Standard Shipping</div>
                  <div style="font-size:0.75rem;color:var(--text-light);">5—7 business days</div>
                </div>
                <div style="font-weight:500;font-size:0.9rem;">${shipping === 0 ? 'FREE' : '$' + shipping.toFixed(2)}</div>
              </label>
              <label style="display:flex;align-items:center;gap:12px;padding:12px;border:1px solid var(--border);border-radius:var(--radius);margin-bottom:8px;cursor:pointer;">
                <input type="radio" name="shipping-method" value="express">
                <div style="flex:1;">
                  <div style="font-weight:500;font-size:0.9rem;">Express Shipping</div>
                  <div style="font-size:0.75rem;color:var(--text-light);">2—3 business days</div>
                </div>
                <div style="font-weight:500;font-size:0.9rem;">$24.00</div>
              </label>
            </div>

            <!-- Payment -->
            <div class="form-section">
              <h3>Payment</h3>
              <div class="payment-methods">
                <button type="button" class="payment-method selected" data-method="card">Credit Card</button>
                <button type="button" class="payment-method" data-method="paypal">PayPal</button>
              </div>
              <div id="card-fields">
                <div class="form-field">
                  <label for="card-number">Card Number *</label>
                  <input type="text" id="card-number" required placeholder="1234 5678 9012 3456" maxlength="19">
                  <span class="error-msg">Valid card number required</span>
                </div>
                <div class="form-row">
                  <div class="form-field">
                    <label for="card-expiry">Expiry Date *</label>
                    <input type="text" id="card-expiry" required placeholder="MM/YY" maxlength="5">
                    <span class="error-msg">Required</span>
                  </div>
                  <div class="form-field">
                    <label for="card-cvc">CVC *</label>
                    <input type="text" id="card-cvc" required placeholder="123" maxlength="4">
                    <span class="error-msg">Required</span>
                  </div>
                </div>
              </div>
              <div id="paypal-fields" style="display:none;">
                <p style="font-size:0.85rem;color:var(--text-secondary);padding:12px;background:var(--bg-secondary);border-radius:var(--radius);">
                  You will be redirected to PayPal to complete your payment after placing the order.
                </p>
              </div>
            </div>

            <button type="submit" class="btn btn-primary btn-lg" style="width:100%;">Place Order</button>

          </form>
        </div>

        <!-- Order Summary Sidebar -->
        <div class="checkout-sidebar">
          <div class="order-summary">
            <h3>Order Summary</h3>
            ${cartItems.map(item => `
              <div class="order-item">
                <div class="oi-image">
                  <div class="placeholder-img" style="font-size:0.5rem;">${item.product.name.slice(0,10)}</div>
                  <div class="oi-count">${item.quantity}</div>
                </div>
                <div class="oi-info">
                  <div style="font-weight:500;">${item.product.name}</div>
                  <div style="font-size:0.75rem;color:var(--text-light);">${item.color} / ${item.size}</div>
                </div>
                <div class="oi-price">$${(item.product.price * item.quantity).toFixed(2)}</div>
              </div>
            `).join('')}
            <div style="border-top:1px solid var(--border);padding-top:12px;margin-top:12px;">
              <div class="summary-row"><span>Subtotal</span><span>$${subtotal.toFixed(2)}</span></div>
              <div class="summary-row"><span>Shipping</span><span id="summary-shipping">${shipping === 0 ? 'FREE' : '$' + shipping.toFixed(2)}</span></div>
              <div class="summary-row"><span>Tax (est.)</span><span>$${tax.toFixed(2)}</span></div>
              <div class="summary-row total"><span>Total</span><span id="summary-total">$${total.toFixed(2)}</span></div>
            </div>
            <p style="font-size:0.7rem;color:var(--text-light);margin-top:12px;line-height:1.5;">
              &#128274; Secure checkout · Your payment information is encrypted
            </p>
          </div>
        </div>
      </div>`;

    // Payment method toggle
    document.querySelectorAll('.payment-method').forEach(btn => {
      btn.addEventListener('click', () => {
        document.querySelectorAll('.payment-method').forEach(b => b.classList.remove('selected'));
        btn.classList.add('selected');
        const method = btn.dataset.method;
        document.getElementById('card-fields').style.display = method === 'card' ? 'block' : 'none';
        document.getElementById('paypal-fields').style.display = method === 'paypal' ? 'block' : 'none';
      });
    });

    // Shipping method updates summary
    document.querySelectorAll('input[name="shipping-method"]').forEach(radio => {
      radio.addEventListener('change', () => {
        const shipCost = radio.value === 'express' ? 24.00 : shipping;
        const newTotal = subtotal + shipCost + tax;
        document.getElementById('summary-shipping').textContent = shipCost === 0 ? 'FREE' : '$' + shipCost.toFixed(2);
        document.getElementById('summary-total').textContent = '$' + newTotal.toFixed(2);
      });
    });

    // Card number formatting
    document.getElementById('card-number').addEventListener('input', function(e) {
      let val = this.value.replace(/\D/g, '');
      if (val.length > 16) val = val.slice(0, 16);
      this.value = val.replace(/(.{4})/g, '$1 ').trim();
    });

    // Expiry formatting
    document.getElementById('card-expiry').addEventListener('input', function(e) {
      let val = this.value.replace(/\D/g, '');
      if (val.length > 4) val = val.slice(0, 4);
      if (val.length > 2) val = val.slice(0, 2) + '/' + val.slice(2);
      this.value = val;
    });

    // Form validation
    document.getElementById('checkout-form').addEventListener('submit', function(e) {
      e.preventDefault();
      let valid = true;
      const requiredFields = ['first-name', 'last-name', 'email', 'address', 'city', 'zip', 'country'];
      const paymentMethod = document.querySelector('.payment-method.selected').dataset.method;

      // Required text fields
      requiredFields.forEach(id => {
        const field = document.getElementById(id);
        const wrapper = field.closest('.form-field');
        if (!field.value.trim()) {
          wrapper.classList.add('error');
          valid = false;
        } else {
          wrapper.classList.remove('error');
        }
      });

      // Email format
      const emailField = document.getElementById('email');
      const emailWrapper = emailField.closest('.form-field');
      if (emailField.value.trim() && !/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(emailField.value)) {
        emailWrapper.classList.add('error');
        valid = false;
      }

      // Card fields (only if credit card)
      if (paymentMethod === 'card') {
        ['card-number', 'card-expiry', 'card-cvc'].forEach(id => {
          const field = document.getElementById(id);
          const wrapper = field.closest('.form-field');
          if (!field.value.trim()) {
            wrapper.classList.add('error');
            valid = false;
          } else {
            wrapper.classList.remove('error');
          }
        });
      }

      if (!valid) {
        // Scroll to first error
        const firstError = document.querySelector('.form-field.error input, .form-field.error select');
        if (firstError) firstError.scrollIntoView({ behavior: 'smooth', block: 'center' });
        showToast('Please fill in all required fields.');
        return;
      }

      // Generate order ID and redirect
      const orderId = 'ATL-' + Date.now().toString(36).toUpperCase() + '-' + Math.random().toString(36).slice(2, 6).toUpperCase();
      clearCart();
      location.href = 'order-success.html?order=' + orderId;
    });

    // Clear errors on input
    document.querySelectorAll('input, select').forEach(el => {
      el.addEventListener('input', () => {
        el.closest('.form-field')?.classList.remove('error');
      });
    });
  }
})();
</script>

</body>
</html>
