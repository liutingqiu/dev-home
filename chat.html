<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=yes">
<title>Reasonix Chat</title>
<link rel="manifest" href="/manifest.json">
<style>
:root{--bg:#0A0A0A;--card:#141414;--input:#1E1E1E;--text:#E8E8E8;--dim:#888;--green:#4A9;--red:#E44;--border:#2A2A2A}
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden}
body{background:var(--bg);color:var(--text);font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif}
#mainApp{display:none;width:100%;height:100%;flex-direction:column}
#mainApp.on{display:flex}

/* header */
#topBar{flex-shrink:0}
#statusBar{display:flex;align-items:center;gap:8px;padding:8px 14px;background:var(--card);border-bottom:1px solid var(--border);font-size:12px;flex-shrink:0}
#statusDot{width:7px;height:7px;border-radius:50%;flex-shrink:0}
#statusDot.ok{background:var(--green);box-shadow:0 0 6px var(--green)}
#statusDot.idle{background:var(--dim)}
#statusDot.err{background:var(--red)}
#statusText{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#tabBar{display:flex;border-bottom:1px solid var(--border);flex-shrink:0}
#tabBar button{flex:1;padding:10px;border:none;background:none;color:var(--dim);font-size:14px;font-family:inherit;border-bottom:2px solid transparent}
#tabBar button.on{color:var(--green);border-bottom-color:var(--green)}

/* messages - THE KEY FIX */
#msgList{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:10px 14px;display:flex;flex-direction:column;gap:8px}
.msg{max-width:85%;display:flex;flex-direction:column}
.msg.me{align-self:flex-end;align-items:flex-end}
.msg.rx{align-self:flex-start;align-items:flex-start}
.msg .bubble{padding:10px 14px;border-radius:14px;font-size:14px;line-height:1.5;word-break:break-word}
.msg.me .bubble{background:var(--green);color:#fff;border-bottom-right-radius:4px}
.msg.rx .bubble{background:var(--card);border-bottom-left-radius:4px}
.msg .time{font-size:10px;color:var(--dim);margin-top:2px;padding:0 4px}
.msg img{max-width:200px;max-height:280px;border-radius:10px;cursor:pointer;margin:4px 0}

/* inspire */
#inspireBox{display:none;flex:1;overflow-y:auto;padding:14px;flex-direction:column}
#inspireBox.on{display:flex}
#inspireInput{flex:1;min-height:120px;padding:12px;background:var(--card);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;font-family:inherit;resize:none;outline:none}

/* footer input */
#inputArea{flex-shrink:0;display:flex;gap:6px;padding:8px 12px;background:var(--card);border-top:1px solid var(--border);align-items:flex-end}
#inputArea.hide{display:none}
#msgInput{flex:1;padding:10px 14px;background:var(--input);border:1px solid var(--border);border-radius:18px;color:var(--text);font-size:14px;font-family:inherit;resize:none;outline:none;max-height:100px}
#sendBtn{flex-shrink:0;padding:8px 16px;border-radius:18px;background:var(--green);color:#fff;border:none;font-size:13px;font-family:inherit}

/* key page */
#keyPage{display:flex;width:100%;height:100%;align-items:center;justify-content:center;flex-direction:column;gap:16px}
#keyPage h2{color:var(--green)}
#keyInput{padding:10px 14px;background:var(--input);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:15px;text-align:center;outline:none;width:260px}
#keyBtn{padding:10px 28px;border-radius:18px;background:var(--green);color:#fff;border:none;font-size:14px}

#imgPreview{display:none;padding:4px 12px 0;gap:8px;align-items:center}
#imgPreview.on{display:flex}
#imgPreview img{width:40px;height:40px;border-radius:6px;object-fit:cover}
#imgPreview button{background:var(--red);color:#fff;border:none;border-radius:50%;width:20px;height:20px;font-size:12px}
</style>
</head>
<body>

<div id="keyPage">
  <h2>Reasonix Chat</h2>
  <input id="keyInput" type="text" placeholder="输入密钥" autocomplete="off">
  <button id="keyBtn">进入</button>
</div>

<div id="mainApp">
  <div id="topBar">
    <div id="statusBar" onclick="this.nextElementSibling.style.display=this.nextElementSibling.style.display==='none'?'block':'none'">
      <div id="statusDot" class="idle"></div>
      <span id="statusText">连接中</span>
    </div>
    <div id="tabBar">
      <button class="on" data-t="chat">⚡ 对话</button>
      <button data-t="inspire">💡 灵感</button>
    </div>
  </div>

  <div id="msgList"></div>

  <div id="inspireBox">
    <textarea id="inspireInput" placeholder="写下灵感，我空闲时分析..."></textarea>
    <div style="margin-top:10px"><button id="inspireSend" style="width:100%;padding:10px;border-radius:18px;background:var(--green);color:#fff;border:none;font-size:14px">保存灵感</button></div>
  </div>

  <div id="imgPreview"><img id="imgThumb"><button onclick="clearImg()">✕</button></div>
  <div id="inputArea">
    <button onclick="document.getElementById('fileInput').click()" style="width:34px;height:34px;border-radius:50%;background:var(--input);border:1px solid var(--border);color:var(--dim);font-size:16px;flex-shrink:0">📎</button>
    <input type="file" id="fileInput" accept="image/*" onchange="pickImg(this)" style="display:none">
    <textarea id="msgInput" rows="1" placeholder="输入..."></textarea>
    <button id="sendBtn" disabled onclick="sendMsg()">发送</button>
  </div>
</div>

<script>
'use strict';
let KEY='',lastId='',timer=null,pendingImg=null;

const $=id=>document.getElementById(id);
const stored=localStorage.getItem('rxkey');
if(stored){KEY=stored;showMain();}

$('keyBtn').onclick=async()=>{
  const k=$('keyInput').value.trim();
  if(!k)return;
  try{const r=await fetch('/api/chat?key='+encodeURIComponent(k));if(r.ok){KEY=k;localStorage.setItem('rxkey',k);showMain()}else{$('keyInput').value='';$('keyInput').placeholder='密钥错误'}}
  catch(e){$('keyInput').placeholder='网络错误'}
};

async function showMain(){
  $('keyPage').style.display='none';
  $('mainApp').classList.add('on');
  await loadMsgs();
  poll();
  setInterval(poll,20000);
  setInterval(updateStatus,15000);
  updateStatus();
  $('msgInput').oninput=()=>{$('msgInput').style.height='auto';$('msgInput').style.height=Math.min($('msgInput').scrollHeight,100)+'px';$('sendBtn').disabled=!$('msgInput').value.trim()&&!pendingImg};
  $('msgInput').onkeydown=e=>{if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}};
  document.querySelectorAll('#tabBar button').forEach(b=>b.onclick=()=>switchTab(b.dataset.t));
}

async function updateStatus(){
  try{
    const s=await(await fetch('/api/status')).json();
    $('statusDot').className=s.active?'ok':s.errors>0?'err':'idle';
    $('statusText').textContent=s.active?s.task:s.lastComplete||'空闲';
  }catch{$('statusDot').className='err';$('statusText').textContent='离线'}
}

function switchTab(t){
  document.querySelectorAll('#tabBar button').forEach(b=>b.classList.toggle('on',b.dataset.t===t));
  $('msgList').style.display=t==='chat'?'flex':'none';
  $('inputArea').classList.toggle('hide',t!=='chat');
  $('inspireBox').classList.toggle('on',t==='inspire');
}

async function loadMsgs(since){
  try{
    const r=await fetch('/api/chat?key='+encodeURIComponent(KEY)+(since?'&since='+since:''));
    const msgs=await r.json();
    if(since){for(const m of msgs)addMsg(m)}else{$('msgList').innerHTML='';for(const m of msgs)addMsg(m)}
    if(msgs.length)lastId=msgs[msgs.length-1].id;
  }catch(e){}
}

function addMsg(m){
  const d=document.createElement('div');
  d.className='msg '+(m.from==='master'?'me':'rx');
  const b=document.createElement('div');b.className='bubble';
  if(m.image){const img=document.createElement('img');img.src=m.image;img.onclick=()=>{const w=window.open('');w.document.write('<img src="'+m.image+'" style="max-width:100%">')};b.appendChild(img)}
  else b.textContent=m.content||'';
  const t=document.createElement('div');t.className='time';
  t.textContent=new Date(m.createdAt).toLocaleTimeString('zh-CN',{hour:'2-digit',minute:'2-digit'});
  d.appendChild(b);d.appendChild(t);
  $('msgList').appendChild(d);
  $('msgList').scrollTop=$('msgList').scrollHeight;
}

async function sendMsg(){
  const txt=$('msgInput').value.trim();
  if(!txt&&!pendingImg)return;
  const body={mode:'urgent',content:txt,image:pendingImg};
  addMsg({id:'',from:'master',content:txt||'',image:pendingImg,createdAt:new Date().toISOString()});
  $('msgInput').value='';$('msgInput').style.height='auto';clearImg();$('sendBtn').disabled=true;
  try{await fetch('/api/chat?key='+encodeURIComponent(KEY),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)})}catch(e){}
}

async function sendInspire(){
  const txt=$('inspireInput').value.trim();if(!txt)return;
  $('inspireSend').textContent='保存中...';$('inspireSend').disabled=true;
  try{await fetch('/api/inspire?key='+encodeURIComponent(KEY),{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({content:txt})});
    $('inspireInput').value='';$('inspireSend').textContent='已保存';setTimeout(()=>{$('inspireSend').textContent='保存灵感';$('inspireSend').disabled=false},1500)}
  catch(e){$('inspireSend').textContent='失败重试';$('inspireSend').disabled=false}
}
$('inspireSend').onclick=sendInspire;

function pickImg(f){const file=f.files[0];if(!file)return;const r=new FileReader();r.onload=e=>{const img=new Image();img.onload=()=>{const c=document.createElement('canvas');let w=img.width,h=img.height;if(w>800){h=h*800/w;w=800}c.width=w;c.height=h;c.getContext('2d').drawImage(img,0,0,w,h);pendingImg=c.toDataURL('image/jpeg',.8);$('imgThumb').src=pendingImg;$('imgPreview').classList.add('on');$('sendBtn').disabled=false};img.src=e.target.result};r.readAsDataURL(file)}
function clearImg(){pendingImg=null;$('imgPreview').classList.remove('on');$('fileInput').value=''}

async function poll(){if(lastId)await loadMsgs(lastId)}
</script>
</body>
</html>
