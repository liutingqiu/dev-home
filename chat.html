<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0,user-scalable=no">
<title>Reasonix Chat</title>
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0A0A0A">
<link rel="manifest" href="/manifest.json">
<style>
:root {
  --bg: #0A0A0A;
  --bg-card: #141414;
  --bg-input: #1E1E1E;
  --text: #E8E8E8;
  --text-dim: #888;
  --accent: #4A9;
  --accent-dim: #2A6;
  --danger: #E44;
  --border: #2A2A2A;
  --radius: 10px;
  --font: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif;
}
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;position:fixed;top:0;left:0;right:0;bottom:0}
body{
  background:var(--bg);
  color:var(--text);
  font-family:var(--font);
  display:flex;flex-direction:column;
  -webkit-tap-highlight-color:transparent;
}
#mainApp{flex:1;display:flex;flex-direction:column;min-height:0;position:relative;overflow:hidden}
#scrollWrap{flex:1;position:relative;min-height:0}

/* ====== 顶部状态栏 ====== */
#statusBar{
  display:flex;align-items:center;gap:8px;
  padding:10px 16px;
  background:var(--bg-card);
  border-bottom:1px solid var(--border);
  font-size:13px;flex-shrink:0;
  cursor:pointer;
}
#statusDot{width:8px;height:8px;border-radius:50%;flex-shrink:0}
#statusDot.active{background:var(--accent);box-shadow:0 0 6px var(--accent)}
#statusDot.idle{background:var(--text-dim)}
#statusDot.error{background:var(--danger);box-shadow:0 0 6px var(--danger)}
#statusText{flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
#statusTime{color:var(--text-dim);font-size:11px;flex-shrink:0}
#statusDetail{display:none;font-size:11px;color:var(--text-dim);padding:4px 16px 8px;background:var(--bg-card);border-bottom:1px solid var(--border)}
#statusBar.expanded + #statusDetail{display:block}

/* ====== Tab 切换 ====== */
#tabBar{
  display:flex;flex-shrink:0;
  border-bottom:1px solid var(--border);
}
#tabBar button{
  flex:1;padding:12px;border:none;background:none;
  color:var(--text-dim);font-size:15px;font-family:var(--font);
  cursor:pointer;transition:color .2s;
  border-bottom:2px solid transparent;
}
#tabBar button.active{color:var(--accent);border-bottom-color:var(--accent)}
#tabBar button:active{opacity:.7}

/* ====== 快捷灵感按钮 ====== */
#quickInspire{
  position:absolute;right:16px;top:12px;z-index:2;
  width:36px;height:36px;border-radius:50%;
  background:var(--bg-card);border:1px solid var(--border);
  color:var(--accent);font-size:18px;cursor:pointer;
  display:none;align-items:center;justify-content:center;
  transition:transform .15s;
}
#quickInspire:active{transform:scale(.9)}
#quickInspire.show{display:flex}

/* ====== 消息列表 ====== */
#msgContainer{
  position:absolute;left:0;right:0;
  overflow-y:auto;padding:12px 16px;
  display:flex;flex-direction:column;gap:10px;
  overscroll-behavior:contain;
}
.msg-row{display:flex;flex-direction:column;max-width:85%}
.msg-row.master{align-self:flex-end;align-items:flex-end}
.msg-row.reasonix{align-self:flex-start;align-items:flex-start}
.msg-bubble{
  padding:10px 14px;border-radius:16px;
  font-size:15px;line-height:1.5;word-break:break-word;
  position:relative;
}
.msg-row.master .msg-bubble{
  background:var(--accent-dim);color:#fff;
  border-bottom-right-radius:4px;
}
.msg-row.reasonix .msg-bubble{
  background:var(--bg-card);color:var(--text);
  border-bottom-left-radius:4px;
}
.msg-meta{
  font-size:11px;color:var(--text-dim);
  margin-top:2px;padding:0 4px;
}
.msg-image{
  max-width:240px;max-height:320px;border-radius:12px;
  cursor:pointer;object-fit:cover;
}
.msg-image-full{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.9);z-index:100;
  display:flex;align-items:center;justify-content:center;
}
.msg-image-full img{max-width:95%;max-height:95%;object-fit:contain}

/* ====== 底部输入区 ====== */
#inputArea{
  display:flex;gap:8px;padding:10px 16px;
  background:var(--bg-card);border-top:1px solid var(--border);
  flex-shrink:0;align-items:flex-end;
}
#msgInput{
  flex:1;resize:none;padding:10px 14px;
  background:var(--bg-input);border:1px solid var(--border);
  border-radius:20px;color:var(--text);font-size:15px;
  font-family:var(--font);line-height:1.4;
  max-height:120px;outline:none;
  transition:border-color .2s;
}
#msgInput:focus{border-color:var(--accent-dim)}
#imgBtn{
  width:40px;height:40px;border-radius:50%;
  background:var(--bg-input);border:1px solid var(--border);
  color:var(--text-dim);font-size:20px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  flex-shrink:0;transition:color .2s;
}
#imgBtn:active{color:var(--accent)}
#sendBtn{
  padding:8px 18px;border-radius:20px;
  background:var(--accent-dim);color:#fff;border:none;
  font-size:14px;font-family:var(--font);cursor:pointer;
  flex-shrink:0;transition:background .2s;
}
#sendBtn:active{background:var(--accent)}
#sendBtn:disabled{background:var(--border);color:var(--text-dim);cursor:default}
#fileInput{display:none}
#imgPreview{
  display:none;padding:8px 16px 0;background:var(--bg-card);
  align-items:center;gap:8px;
}
#imgPreview.show{display:flex}
#imgPreview img{width:48px;height:48px;border-radius:8px;object-fit:cover}
#imgPreview button{
  background:var(--danger);color:#fff;border:none;
  border-radius:50%;width:24px;height:24px;font-size:14px;
  cursor:pointer;flex-shrink:0;
}

/* ====== Toast ====== */
#toast{
  position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);
  background:var(--bg-card);border:1px solid var(--accent);
  border-radius:12px;padding:16px 24px;z-index:200;
  display:none;text-align:center;max-width:280px;
  box-shadow:0 8px 32px rgba(0,0,0,.5);
}
#toast.show{display:block;animation:toastIn .3s ease}
#toast .toast-title{font-size:16px;color:var(--accent);margin-bottom:6px}
#toast .toast-body{font-size:14px;color:var(--text-dim)}
#toast .toast-btn{
  margin-top:12px;padding:8px 24px;border-radius:20px;
  background:var(--accent-dim);color:#fff;border:none;
  font-size:14px;cursor:pointer;
}

/* ====== Key 输入页 ====== */
#keyPage{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:var(--bg);z-index:300;
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:20px;padding:24px;
}
#keyPage h2{color:var(--accent);font-size:24px}
#keyPage p{color:var(--text-dim);font-size:14px;text-align:center}
#keyInput{
  width:100%;max-width:300px;padding:12px 16px;
  background:var(--bg-input);border:1px solid var(--border);
  border-radius:12px;color:var(--text);font-size:16px;
  text-align:center;outline:none;
}
#keyInput:focus{border-color:var(--accent-dim)}
#keyBtn{
  padding:10px 32px;border-radius:20px;
  background:var(--accent-dim);color:#fff;border:none;
  font-size:15px;cursor:pointer;
}
#keyError{color:var(--danger);font-size:13px;display:none}

/* ====== 未读标记 ====== */
.unread-badge{
  background:var(--danger);color:#fff;font-size:10px;
  padding:2px 7px;border-radius:10px;margin-left:6px;
}

@keyframes toastIn{from{opacity:0;transform:translate(-50%,-50%) scale(.9)}to{opacity:1;transform:translate(-50%,-50%) scale(1)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}

/* ====== 灵感池输入框 ====== */
#inspireInput{
  width:100%;min-height:120px;padding:14px;
  background:var(--bg-card);border:1px solid var(--border);
  border-radius:12px;color:var(--text);font-size:15px;
  font-family:var(--font);resize:vertical;outline:none;
  margin-bottom:12px;
}
#inspireInput:focus{border-color:var(--accent-dim)}
</style>
</head>
<body>

<!-- ====== Key 输入页 ====== -->
<div id="keyPage">
  <h2>🔐 Reasonix Chat</h2>
  <p>请输入访问密钥</p>
  <input id="keyInput" type="text" placeholder="32位密钥" autocomplete="off">
  <button id="keyBtn">进入</button>
  <p id="keyError">密钥错误</p>
</div>

<!-- ====== 主界面 ====== -->
<div id="mainApp" style="display:none;flex:1;flex-direction:column;position:relative">

<!-- 状态栏 -->
<div id="statusBar" onclick="toggleStatus()">
  <div id="statusDot" class="idle"></div>
  <span id="statusText">连接中...</span>
  <span id="statusTime"></span>
</div>
<div id="statusDetail"></div>

<!-- Tab -->
<div id="tabBar">
  <button class="active" data-tab="chat" onclick="switchTab('chat')">⚡ 实时对话</button>
  <button data-tab="inspire" onclick="switchTab('inspire')">💡 灵感池</button>
</div>

<!-- 快捷灵感按钮 -->
<button id="quickInspire" onclick="quickInspire()" title="快速灵感">💡</button>

<!-- 聊天消息 -->
<div id="msgContainer"></div>

<!-- 灵感池输入 -->
<div id="inspirePanel" style="display:none;flex:1;flex-direction:column;padding:16px;overflow-y:auto">
  <textarea id="inspireInput" placeholder="写下你的灵感...&#10;&#10;我会在空闲时分析并给出方案，结果存档供你随时查阅。"></textarea>
  <div id="inspireImgPreview" style="display:none;align-items:center;gap:8px;margin-bottom:12px">
    <img id="inspireImgThumb" style="width:48px;height:48px;border-radius:8px;object-fit:cover">
    <button onclick="clearInspireImage()" style="background:var(--danger);color:#fff;border:none;border-radius:50%;width:24px;height:24px;font-size:14px;cursor:pointer">✕</button>
  </div>
  <div style="display:flex;gap:8px">
    <button id="inspireImgBtn" onclick="document.getElementById('fileInput2').click()" style="width:40px;height:40px;border-radius:50%;background:var(--bg-input);border:1px solid var(--border);color:var(--text-dim);font-size:18px;cursor:pointer">📎</button>
    <input type="file" id="fileInput2" accept="image/*" onchange="handleInspireImage(this)" style="display:none">
    <button id="inspireSendBtn" onclick="sendInspire()" style="flex:1;padding:10px;border-radius:20px;background:var(--accent-dim);color:#fff;border:none;font-size:14px;cursor:pointer">保存灵感</button>
  </div>
</div>

<!-- 输入区（聊天Tab） -->
<div id="inputArea">
  <div id="imgPreview">
    <img id="imgThumb" src="">
    <button onclick="clearImage()">✕</button>
  </div>
  <button id="imgBtn" onclick="document.getElementById('fileInput').click()">📎</button>
  <input type="file" id="fileInput" accept="image/*" onchange="handleImage(this)" style="display:none">
  <textarea id="msgInput" rows="1" placeholder="输入消息..."></textarea>
  <button id="sendBtn" disabled onclick="sendMessage()">发送</button>
</div>

</div><!-- /mainApp -->

<!-- Toast -->
<div id="toast">
  <div class="toast-title">⚡ Reasonix 回复了</div>
  <div class="toast-body" id="toastBody"></div>
  <button class="toast-btn" onclick="dismissToast()">知道了</button>
</div>

<!-- 图片全屏 -->
<div id="imageFull" style="display:none" onclick="this.style.display='none'">
  <img id="imageFullImg" src="">
</div>

<script>
'use strict';

// ============ 状态 ============
let CHAT_KEY = '';
let currentTab = 'chat';
let lastMsgId = '';
let pollingTimer = null;
let pendingImage = null;
let pendingInspireImage = null;
let unreadUrgent = 0;

// ============ Key 管理 ============
const keyPage = document.getElementById('keyPage');
const keyInput = document.getElementById('keyInput');
const keyError = document.getElementById('keyError');
const mainApp = document.getElementById('mainApp');

// 尝试从 URL 获取 key
const urlParams = new URLSearchParams(location.search);
const urlKey = urlParams.get('key');
const storedKey = localStorage.getItem('reasonix_chat_key');

if (urlKey) {
  CHAT_KEY = urlKey;
  localStorage.setItem('reasonix_chat_key', CHAT_KEY);
  // 清除 URL 中的 key
  history.replaceState(null, '', location.pathname);
  showMain();
} else if (storedKey) {
  CHAT_KEY = storedKey;
  showMain();
} else {
  keyPage.style.display = 'flex';
}

keyInput.addEventListener('keydown', e => {
  if (e.key === 'Enter') verifyKey();
});

document.getElementById('keyBtn').addEventListener('click', verifyKey);

async function verifyKey() {
  const key = keyInput.value.trim();
  if (!key) return;
  const resp = await fetch(`/api/chat?key=${encodeURIComponent(key)}`);
  if (resp.ok) {
    CHAT_KEY = key;
    localStorage.setItem('reasonix_chat_key', CHAT_KEY);
    showMain();
  } else {
    keyError.style.display = 'block';
    keyInput.value = '';
  }
}

function showMain() {
  keyPage.style.display = 'none';
  mainApp.style.display = 'flex';
  init();
}

// ============ 布局计算 ============
function resizeContainer() {
  const container = document.getElementById('msgContainer');
  if (!container) return;
  const header = document.getElementById('statusBar').offsetHeight + document.getElementById('tabBar').offsetHeight;
  const footer = currentTab === 'chat' ? document.getElementById('inputArea').offsetHeight : document.getElementById('inspirePanel').offsetHeight;
  container.style.top = header + 'px';
  container.style.bottom = (footer + 10) + 'px';
}
window.addEventListener('resize', resizeContainer);
window.addEventListener('orientationchange', () => setTimeout(resizeContainer, 200));

// ============ 初始化 ============
async function init() {
  resizeContainer();
  await loadMessages();
  await updateStatus();
  startPolling();
  setInterval(updateStatus, 10000); // 状态每10s刷新
  document.getElementById('msgInput').focus();

  // 输入框自动调整高度
  const input = document.getElementById('msgInput');
  input.addEventListener('input', () => {
    input.style.height = 'auto';
    input.style.height = Math.min(input.scrollHeight, 120) + 'px';
    document.getElementById('sendBtn').disabled = !input.value.trim() && !pendingImage;
  });
  input.addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
}

// ============ 状态栏 ============
async function updateStatus() {
  try {
    const resp = await fetch('/api/status');
    const s = await resp.json();
    const dot = document.getElementById('statusDot');
    const text = document.getElementById('statusText');
    const time = document.getElementById('statusTime');
    const detail = document.getElementById('statusDetail');

    dot.className = s.active ? 'active' : s.errors > 0 ? 'error' : 'idle';

    if (s.active) {
      text.textContent = s.task || '工作中';
      if (s.errors > 0) text.textContent += ` (${s.errors}个错误)`;
    } else {
      text.textContent = s.lastComplete ? `空闲 · 上次：${s.lastComplete}` : '空闲';
    }

    const d = new Date(s.updated);
    time.textContent = d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });

    detail.innerHTML = s.detail ? `📋 ${s.detail}<br>🕐 开始: ${s.started || '-'}<br>❌ 错误: ${s.errors}` : '';
  } catch {
    document.getElementById('statusDot').className = 'error';
    document.getElementById('statusText').textContent = '服务器离线';
  }
}

function toggleStatus() {
  document.getElementById('statusBar').classList.toggle('expanded');
}

// ============ Tab 切换 ============
function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('#tabBar button').forEach(b => b.classList.toggle('active', b.dataset.tab === tab));
  document.getElementById('msgContainer').style.display = tab === 'chat' ? 'flex' : 'none';
  document.getElementById('inputArea').style.display = tab === 'chat' ? 'flex' : 'none';
  document.getElementById('inspirePanel').style.display = tab === 'inspire' ? 'flex' : 'none';
  document.getElementById('quickInspire').classList.toggle('show', tab === 'chat');
}

function quickInspire() {
  switchTab('inspire');
  document.getElementById('inspireInput').focus();
}

// ============ 消息加载 ============
async function loadMessages(since) {
  try {
    let url = `/api/chat?key=${encodeURIComponent(CHAT_KEY)}`;
    if (since) url += `&since=${encodeURIComponent(since)}`;
    const resp = await fetch(url);
    const msgs = await resp.json();

    if (since) {
      // 增量追加
      for (const m of msgs) appendMessage(m);
    } else {
      // 初始加载
      document.getElementById('msgContainer').innerHTML = '';
      for (const m of msgs) appendMessage(m);
    }

    // 更新 lastMsgId
    if (msgs.length > 0) lastMsgId = msgs[msgs.length - 1].id;

    // 检测未读 urgent
    const newUrgent = msgs.filter(m => m.from === 'reasonix' && m.mode === 'urgent' && !m.read);
    if (newUrgent.length > 0 && since) {
      const last = newUrgent[newUrgent.length - 1];
      showToast(last.content);
    }
  } catch (e) {
    console.error('加载消息失败:', e);
  }
}

function appendMessage(m) {
  const container = document.getElementById('msgContainer');
  const row = document.createElement('div');
  row.className = `msg-row ${m.from}`;

  const bubble = document.createElement('div');
  bubble.className = 'msg-bubble';

  if (m.type === 'image' && m.image) {
    const img = document.createElement('img');
    img.className = 'msg-image';
    img.src = m.image;
    img.loading = 'lazy';
    img.onclick = () => {
      document.getElementById('imageFullImg').src = m.image;
      document.getElementById('imageFull').style.display = 'flex';
    };
    bubble.appendChild(img);
  } else {
    bubble.textContent = m.content || '';
  }

  const meta = document.createElement('div');
  meta.className = 'msg-meta';
  const d = new Date(m.createdAt);
  meta.textContent = `${m.from === 'master' ? '主人' : 'Reasonix'} · ${d.toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' })}`;

  row.appendChild(bubble);
  row.appendChild(meta);
  container.appendChild(row);

  // 滚动到底部
  container.scrollTop = container.scrollHeight;
}

// ============ 发送消息 ============
async function sendMessage() {
  const input = document.getElementById('msgInput');
  const content = input.value.trim();
  if (!content && !pendingImage) return;

  const body = { mode: 'urgent', content, image: pendingImage };

  // 乐观渲染
  const optimistic = {
    id: 'opt-' + Date.now(),
    from: 'master', mode: 'urgent',
    type: pendingImage ? 'image' : 'text',
    content, image: pendingImage,
    createdAt: new Date().toISOString()
  };
  appendMessage(optimistic);

  // 清空
  input.value = '';
  input.style.height = 'auto';
  clearImage();
  document.getElementById('sendBtn').disabled = true;

  try {
    const resp = await fetch(`/api/chat?key=${encodeURIComponent(CHAT_KEY)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(body)
    });
    if (!resp.ok) throw new Error('发送失败');
  } catch (e) {
    // 标记失败
    const last = document.getElementById('msgContainer').lastElementChild;
    if (last) last.querySelector('.msg-bubble').style.opacity = '0.5';
    console.error('发送失败:', e);
  }

  input.focus();
}

// ============ 发送灵感 ============
async function sendInspire() {
  const input = document.getElementById('inspireInput');
  const content = input.value.trim();
  if (!content) return;

  const btn = document.getElementById('inspireSendBtn');
  btn.disabled = true;
  btn.textContent = '保存中...';

  try {
    await fetch(`/api/inspire?key=${encodeURIComponent(CHAT_KEY)}`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ content, image: pendingInspireImage })
    });
    input.value = '';
    clearInspireImage();
    btn.textContent = '✅ 已保存';
    setTimeout(() => { btn.textContent = '保存灵感'; btn.disabled = false; }, 1500);
  } catch (e) {
    btn.textContent = '❌ 失败，重试';
    btn.disabled = false;
  }
}

// ============ 图片处理 ============
function handleImage(input) {
  const file = input.files[0];
  if (!file) return;
  resizeImage(file, 1200, (base64) => {
    pendingImage = base64;
    const preview = document.getElementById('imgPreview');
    const thumb = document.getElementById('imgThumb');
    thumb.src = base64;
    preview.classList.add('show');
    document.getElementById('sendBtn').disabled = false;
  });
}

function clearImage() {
  pendingImage = null;
  document.getElementById('imgPreview').classList.remove('show');
  document.getElementById('fileInput').value = '';
}

function handleInspireImage(input) {
  const file = input.files[0];
  if (!file) return;
  resizeImage(file, 1200, (base64) => {
    pendingInspireImage = base64;
    document.getElementById('inspireImgThumb').src = base64;
    document.getElementById('inspireImgPreview').style.display = 'flex';
  });
}

function clearInspireImage() {
  pendingInspireImage = null;
  document.getElementById('inspireImgPreview').style.display = 'none';
  document.getElementById('fileInput2').value = '';
}

function resizeImage(file, maxSize, callback) {
  const reader = new FileReader();
  reader.onload = function(e) {
    const img = new Image();
    img.onload = function() {
      const canvas = document.createElement('canvas');
      let w = img.width, h = img.height;
      if (w > maxSize) { h = h * maxSize / w; w = maxSize; }
      if (h > maxSize) { w = w * maxSize / h; h = maxSize; }
      canvas.width = w; canvas.height = h;
      canvas.getContext('2d').drawImage(img, 0, 0, w, h);
      callback(canvas.toDataURL('image/jpeg', 0.85));
    };
    img.src = e.target.result;
  };
  reader.readAsDataURL(file);
}

// ============ 轮询 ============
function startPolling() {
  pollingTimer = setInterval(async () => {
    if (currentTab === 'chat' && lastMsgId) {
      await loadMessages(lastMsgId);
    }
  }, 15000);
}

// ============ Toast ============
function showToast(msg) {
  document.getElementById('toastBody').textContent = msg;
  document.getElementById('toast').classList.add('show');
  // 3秒后自动消失
  setTimeout(dismissToast, 5000);
}

function dismissToast() {
  document.getElementById('toast').classList.remove('show');
}

// ============ 页面可见性变化 ============
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && lastMsgId) {
    loadMessages(lastMsgId);
  }
});

// 注册 Service Worker
if ('serviceWorker' in navigator) {
  navigator.serviceWorker.register('/sw.js').catch(() => {});
}
</script>
