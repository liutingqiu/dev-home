<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><meta name="robots" content="index,follow"><title>项目申请 · 柳亭秋</title><meta name="description" content="提交你的项目需求，柳亭秋将在24小时内与你联系，沟通网站定制方案。"><meta property="og:title" content="项目申请 · 柳亭秋"><meta property="og:description" content="提交项目需求，24小时内联系沟通方案。"><meta property="og:type" content="website"><link rel="stylesheet" href="/css/style.css"></head><body><div class="paper-bg"></div>
<main class="sub-page container" style="max-width:600px;margin:0 auto">
<nav class="sub-nav"><a href="/" class="back-link">← 返回首页</a></nav>
<article><h1>项目申请</h1><p class="sub-title">PROJECT APPLICATION</p>
<div class="card" style="margin-bottom:24px"><p style="color:#666;font-size:14px;line-height:1.8">填写以下信息，简要描述你的项目需求。收到申请后我会在 <strong style="color:#222">24 小时内</strong> 与你联系，沟通细节和方案。</p></div>
<form id="applyForm">
  <div style="margin-bottom:16px"><label style="display:block;font-size:14px;font-weight:600;color:#222;margin-bottom:6px">姓名 <span style="color:#d33">*</span></label><input type="text" name="name" required style="width:100%;height:44px;padding:0 14px;background:#fff;border:1px solid #E5E5E5;border-radius:8px;font-size:16px;font-family:inherit;color:#333;outline:none;transition:border-color .2s"></div>
  <div style="margin-bottom:16px"><label style="display:block;font-size:14px;font-weight:600;color:#222;margin-bottom:6px">联系电话 <span style="color:#d33">*</span></label><input type="text" name="phone" required style="width:100%;height:44px;padding:0 14px;background:#fff;border:1px solid #E5E5E5;border-radius:8px;font-size:16px;font-family:inherit;color:#333;outline:none;transition:border-color .2s"></div>
  <div style="margin-bottom:16px"><label style="display:block;font-size:14px;font-weight:600;color:#222;margin-bottom:6px">电子邮箱</label><input type="email" name="email" style="width:100%;height:44px;padding:0 14px;background:#fff;border:1px solid #E5E5E5;border-radius:8px;font-size:16px;font-family:inherit;color:#333;outline:none;transition:border-color .2s"></div>
  <div style="margin-bottom:20px"><label style="display:block;font-size:14px;font-weight:600;color:#222;margin-bottom:6px">项目需求 <span style="color:#d33">*</span></label><textarea name="description" required rows="4" placeholder="请描述你的项目：行业类型、需要的页面数量、功能需求等..." style="width:100%;padding:12px 14px;background:#fff;border:1px solid #E5E5E5;border-radius:8px;font-size:16px;font-family:inherit;color:#333;outline:none;resize:vertical;transition:border-color .2s;min-height:120px"></textarea></div>
  <button type="submit" class="btn-dark btn-full" style="width:100%;font-size:16px;padding:14px">提交申请</button>
  <p style="text-align:center;margin-top:12px;font-size:13px;min-height:18px" id="formFeedback"></p>
</form>
</article></main>
<script>
document.getElementById('applyForm').addEventListener('submit',async e=>{
  e.preventDefault();
  const fb=document.getElementById('formFeedback');
  const btn=e.target.querySelector('button');
  const fd=new FormData(e.target);
  const data={name:fd.get('name'),phone:fd.get('phone'),email:fd.get('email'),description:fd.get('description')};
  fb.textContent='';btn.disabled=true;btn.textContent='提交中...';
  try{
    const res=await fetch('/api/apply',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(data)});
    const r=await res.json();
    if(res.ok){fb.style.color='#3a8';fb.textContent='提交成功！我会在24小时内联系你。';e.target.reset()}
    else{fb.style.color='#d33';fb.textContent=r.error||'提交失败'}
  }catch{fb.style.color='#d33';fb.textContent='网络错误，请重试'}
  finally{btn.disabled=false;btn.textContent='提交申请'}
});
</script>

<script src="http://121.41.95.44:4000/tracker.js" data-site-id="dev-home"></script>
</body></html>
