<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>技术速递 · dev-home</title>
<meta name="description" content="技术速递——来自11个平台的热门内容，精细分类，支持搜索和排序。">
<link rel="stylesheet" href="/css/style.css">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+SC:wght@400;700&display=swap" rel="stylesheet">
<style>
.dg-wrap{max-width:900px;margin:0 auto;padding:80px 20px}
.dg-head{text-align:center;margin-bottom:32px}
.dg-head h1{font-family:'Noto Serif SC',serif;font-size:32px}
.dg-search{display:flex;gap:8px;margin-bottom:24px}
.dg-search input{flex:1;padding:10px 16px;border:1px solid var(--border-light);border-radius:10px;font-size:14px;outline:none;font-family:inherit;background:var(--bg-card)}
.dg-search input:focus{border-color:var(--accent-success)}
.dg-sort{display:flex;gap:8px;margin-bottom:24px}
.dg-sort button{padding:6px 16px;border:1px solid var(--border-light);border-radius:20px;background:var(--bg-card);font-size:13px;cursor:pointer;color:var(--text-secondary)}
.dg-sort button.on{background:var(--accent-success);color:#fff;border-color:var(--accent-success)}
.cat-block{margin-bottom:36px}
.cat-h{display:flex;justify-content:space-between;align-items:center;padding-bottom:8px;border-bottom:2px solid var(--accent-success);margin-bottom:12px;cursor:pointer}
.cat-h h2{font-size:18px;font-weight:700}
.cat-h .count{font-size:12px;color:var(--text-muted)}
.dg-item{display:flex;padding:8px 0;border-bottom:1px solid var(--border-light);gap:10px;align-items:flex-start}
.dg-score{flex-shrink:0;font-size:11px;color:var(--text-muted);min-width:45px;text-align:right;padding-top:2px}
.dg-title{flex:1;font-size:14px;line-height:1.4}
.dg-title a{color:var(--text-primary);font-weight:500}
.dg-title a:hover{color:var(--accent-success)}
.dg-desc{font-size:12px;color:var(--text-muted);margin-top:2px}
.dg-source{flex-shrink:0;font-size:10px;background:var(--border-light);padding:1px 6px;border-radius:4px;color:var(--text-muted);margin-top:2px}
.expand-btn{display:block;text-align:center;padding:8px;color:var(--accent-success);font-size:13px;cursor:pointer;margin-top:8px}
.expand-btn:hover{text-decoration:underline}
.empty{padding:60px;text-align:center;color:var(--text-muted)}
.back{padding:20px;text-align:center}
@media(max-width:768px){.dg-wrap{padding:60px 14px}}
</style>
</head>
<body>
<div id="mainContent">
<nav class="site-nav">
  <a href="/" class="nav-brand">柳亭秋</a>
  <div class="nav-links">
    <a href="/blog/">博客</a><a href="/daily/">日报</a><a href="/digest/" style="color:var(--accent-success)">速递</a><a href="/docs.html">文档</a>
  </div>
</nav>

<div class="dg-wrap">
<div class="dg-head"><h1>📡 技术速递</h1><p style="color:var(--text-muted);font-size:14px;margin-top:6px">来自 11 个平台，实时分类检索</p></div>

<div class="dg-search">
  <input id="searchInput" type="text" placeholder="搜索标题或描述..." oninput="render()">
</div>

<div class="dg-sort">
  <button class="on" data-s="hot" onclick="setSort('hot')">🔥 热门优先</button>
  <button data-s="new" onclick="setSort('new')">🕐 最新优先</button>
</div>

<div id="content"><p class="empty">加载中...</p></div>
<div class="back"><a href="/">← 返回首页</a></div>
</div>
</div>

<script>
'use strict';
let allData = [], sort = 'hot', expandCats = {};

async function init(){
  try{
    const r = await fetch('/api/digest?limit=2000').then(r=>r.json());
    allData = r.items || [];
    render();
  }catch(e){ document.getElementById('content').innerHTML = '<p class="empty">加载失败</p>'; }
}

function setSort(s){
  sort = s;
  document.querySelectorAll('.dg-sort button').forEach(b=>b.classList.toggle('on',b.dataset.s===s));
  render();
}

function render(){
  const search = (document.getElementById('searchInput').value||'').toLowerCase();
  let items = allData;
  if(search) items = items.filter(i=>(i.title+i.description).toLowerCase().includes(search));

  const sorted = [...items].sort((a,b)=> sort==='new' ? b.time.localeCompare(a.time) : b.score - a.score);

  const seen = new Set();
  const unique = sorted.filter(i=>{if(seen.has(i.url))return false;seen.add(i.url);return true});

  const grouped = {};
  for(const i of unique){
    if(!grouped[i.cat]) grouped[i.cat] = [];
    grouped[i.cat].push(i);
  }

  const cats = Object.keys(grouped).sort((a,b)=>grouped[b].length-grouped[a].length);

  let html = '';
  for(const cat of cats){
    const all = grouped[cat];
    const expanded = expandCats[cat];
    const show = expanded ? all : all.slice(0,10);

    html += `<div class="cat-block">
      <div class="cat-h" onclick="toggleCat('${cat}')">
        <h2>${cat} <span class="count">(${all.length})</span></h2>
        <span style="font-size:12px;color:var(--text-muted)">${expanded?'收起':'展开'}</span>
      </div>
      ${show.map(i=>`
        <div class="dg-item">
          <div class="dg-score">${i.score>=1000?(i.score/1000).toFixed(1)+'k':i.score}</div>
          <div class="dg-title">
            <a href="${i.url}" target="_blank">${i.title}</a>
            <div class="dg-desc">${i.description||''}</div>
          </div>
          <div class="dg-source">${(i.source||'').slice(0,10)}</div>
        </div>
      `).join('')}
      ${all.length > 10 && !expanded ? `<div class="expand-btn" onclick="toggleCat('${cat}')">展开全部 ${all.length} 条 ↓</div>` : ''}
    </div>`;
  }

  document.getElementById('content').innerHTML = html || '<p class="empty">无结果</p>';
}

function toggleCat(cat){
  expandCats[cat] = !expandCats[cat];
  render();
}

init();
</script>
</body>
</html>
