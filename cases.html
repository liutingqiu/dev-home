<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>项目案例 · 柳亭秋</title><meta name="description" content="柳亭秋交付的项目案例：鲜味居粤菜餐厅、ALTESSE巴黎高定、个人品牌站、蛋糕商城、Reasonix内容矩阵。"><meta property="og:title" content="项目案例 · 柳亭秋"><meta property="og:description" content="5个已交付的全栈项目案例。"><meta property="og:type" content="website"><link rel="stylesheet" href="/css/style.css"><style>
.project-card{background:var(--bg-card);border:1px solid var(--border-light);border-radius:16px;padding:28px 32px;margin-bottom:20px;display:flex;gap:24px;align-items:flex-start;transition:transform .2s,box-shadow .2s}
.project-card:hover{transform:translateY(-3px);box-shadow:var(--shadow-md)}
.project-icon{font-size:48px;flex-shrink:0}
.project-info{flex:1}
.project-info h3{font-size:20px;margin-bottom:6px;color:var(--text-primary)}
.project-info p{font-size:14px;color:var(--text-secondary);line-height:1.7;margin-bottom:10px}
.project-tags{display:flex;gap:6px;flex-wrap:wrap}
.project-tag{padding:2px 10px;border-radius:12px;font-size:11px;font-weight:600;background:var(--border-light);color:var(--text-secondary)}
.project-link{font-size:13px;color:var(--accent-success);margin-top:6px;display:inline-block}
.empty{text-align:center;padding:60px;color:var(--text-muted)}
@media(max-width:768px){.project-card{flex-direction:column;padding:24px;gap:12px}.project-icon{font-size:36px}}
</style></head><body>
<main class="sub-page container" style="max-width:900px;margin:0 auto">
<nav class="sub-nav"><a href="/" class="back-link">← 返回首页</a></nav>
<h1>项目案例</h1><p class="sub-title">DELIVERED PROJECTS</p>
<div id="projects">加载中...</div>
<div style="text-align:center;margin-top:40px"><a href="/apply.html" class="btn-dark" style="display:inline-flex;width:auto;padding:0 32px">我也想要一个这样的网站</a></div>
</main>
<script>
'use strict';
(async()=>{
  try{
    const projects=await fetch('/api/projects').then(r=>r.json());
    if(!projects.length){document.getElementById('projects').innerHTML='<p class="empty">暂无项目</p>';return}
    document.getElementById('projects').innerHTML=projects.map(p=>`
      <div class="project-card">
        <div class="project-icon">${p.icon||'📦'}</div>
        <div class="project-info">
          <h3>${p.name}</h3>
          <p>${p.desc}</p>
          <div class="project-tags">${(p.tags||[]).map(t=>`<span class="project-tag">${t}</span>`).join('')}</div>
          ${p.url?`<a class="project-link" href="${p.url}" target="_blank">🔗 访问项目 →</a>`:''}
        </div>
      </div>
    `).join('');
  }catch(e){document.getElementById('projects').innerHTML='<p class="empty">加载失败</p>'}
})();
</script>
</body></html>
