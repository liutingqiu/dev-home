<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>网站开发费用估算 · 柳亭秋</title><style>
:root{--bg:#F8F6F2;--card:#fff;--text:#222;--dim:#666;--border:#E5E5E5;--accent:#333;--highlight:#c8e6c9}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;color:var(--text);line-height:1.6;min-height:100vh}
.container{max-width:680px;margin:0 auto;padding:48px 24px}
h1{font-size:28px;margin-bottom:4px}h1 span{display:block;font-size:14px;color:var(--dim);font-weight:400;margin-top:4px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:14px}
.card label{display:block;font-size:14px;font-weight:600;color:var(--text);margin-bottom:6px}
.card select,.card input[type=range]{width:100%}
.card select{height:44px;padding:0 12px;border:1px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;background:#fff;outline:none}
.card select:focus{border-color:var(--accent)}
.range-row{display:flex;align-items:center;gap:12px}
.range-row .val{font-weight:700;font-size:18px;min-width:60px;text-align:center;color:var(--accent)}
input[type=range]{flex:1;-webkit-appearance:none;height:6px;border-radius:3px;background:var(--border);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:22px;height:22px;border-radius:50%;background:var(--accent);cursor:pointer}
.price-box{text-align:center;padding:28px;margin-top:16px;background:var(--highlight);border-radius:12px}
.price-box .p-label{font-size:13px;color:var(--dim);margin-bottom:4px}
.price-box .p-amount{font-size:48px;font-weight:900;color:var(--accent)}
.price-box .p-range{font-size:13px;color:var(--dim);margin-top:4px}
.breakdown{font-size:13px;color:var(--dim);margin-top:12px;line-height:2}
.breakdown span{color:var(--text);font-weight:600}
.footer{text-align:center;padding:32px 0;color:var(--dim);font-size:13px}
.footer a{color:var(--accent);text-decoration:underline}
.checkboxes{display:flex;flex-wrap:wrap;gap:10px}
.checkboxes label{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:400;padding:6px 12px;border:1px solid var(--border);border-radius:20px;cursor:pointer;transition:all .2s;background:#fff}
.checkboxes label:hover{border-color:var(--accent)}
.checkboxes input[type=checkbox]{accent-color:var(--accent)}
.note{font-size:12px;color:var(--dim);margin-top:12px;padding:12px;background:#f5f5f5;border-radius:8px}
</style></head><body>
<div class="container">
<h1>💰 网站开发费用估算<span>选几个参数，看看市场参考价（这是阉割版，完整报价需沟通确认）</span></h1>

<div class="card">
  <label>行业类型</label>
  <select id="industry">
    <option value="restaurant">餐饮（餐厅/咖啡厅/甜品店）</option>
    <option value="salon">美业（美发/美甲/美容）</option>
    <option value="retail">零售（服装/百货/特产）</option>
    <option value="service">服务（工作室/婚庆/摄影）</option>
    <option value="other">其他行业</option>
  </select>
</div>

<div class="card">
  <label>页面数量（含首页和后台）</label>
  <div class="range-row">
    <span style="font-size:12px;color:var(--dim)">5页</span>
    <input type="range" id="pages" min="5" max="20" value="10" step="1" oninput="document.getElementById('pagesVal').textContent=this.value+'页';calc()">
    <span style="font-size:12px;color:var(--dim)">20页</span>
    <span class="val" id="pagesVal">10页</span>
  </div>
</div>

<div class="card">
  <label>需要的功能（可多选）</label>
  <div class="checkboxes">
    <label><input type="checkbox" id="f1" onchange="calc()" checked> 后台管理</label>
    <label><input type="checkbox" id="f2" onchange="calc()" checked> 手机适配</label>
    <label><input type="checkbox" id="f3" onchange="calc()" checked> 联系表单</label>
    <label><input type="checkbox" id="f4" onchange="calc()"> 在线菜单/商品</label>
    <label><input type="checkbox" id="f5" onchange="calc()"> 用户注册登录</label>
    <label><input type="checkbox" id="f6" onchange="calc()"> SEO优化</label>
    <label><input type="checkbox" id="f7" onchange="calc()"> 安全加固</label>
    <label><input type="checkbox" id="f8" onchange="calc()"> 数据统计</label>
  </div>
</div>

<div class="card">
  <label>交付周期要求</label>
  <select id="speed" onchange="calc()">
    <option value="normal">正常（1-2周）</option>
    <option value="fast">加急（3-5天）</option>
  </select>
</div>

<div class="price-box">
  <div class="p-label">预估费用区间</div>
  <div class="p-amount" id="priceDisplay">¥3,000 - 5,000</div>
  <div class="p-range">含全套源码交付 + 后台管理 + 一年维护</div>
  <div class="breakdown" id="breakdown"></div>
</div>

<p class="note">⚠️ 这是基于市场平均水平的**机器估算**，不是最终报价。实际价格取决于设计复杂度、功能细节、内容量等因素。输入联系方式获取**人工精确报价**（通常比机器估算更优惠）。</p>

<div class="footer">
  获取精确报价 → 📱 15776020826 · 💬 微信 ltqly08260717 · 📧 QQ 3685590323 · <a href="/">柳亭秋官网</a>
</div>
</div>
<script>
function calc(){
  const pages=parseInt(document.getElementById('pages').value);
  const industry=document.getElementById('industry').value;
  const speed=document.getElementById('speed').value;
  const features=[1,2,3,4,5,6,7,8].filter(i=>document.getElementById('f'+i).checked).length;

  // Base price by pages
  const basePerPage={restaurant:80,salon:70,retail:60,service:70,other:70};
  let base=pages*basePerPage[industry];

  // Feature multiplier
  const featureBoost=features*80;
  base+=featureBoost;

  // Speed multiplier
  if(speed==='fast')base*=1.3;

  // Calculate range (±15%)
  const low=Math.round(base*0.85/100)*100;
  const high=Math.round(base*1.15/100)*100;

  document.getElementById('priceDisplay').textContent='¥'+low.toLocaleString()+' - ¥'+high.toLocaleString();

  const bd=[];
  bd.push(`<span>${pages}</span> 个页面 × <span>¥${basePerPage[industry]}</span>/页 = <span>¥${pages*basePerPage[industry]}</span>`);
  bd.push(`<span>${features}</span> 个功能模块 × <span>¥80</span> = <span>¥${featureBoost}</span>`);
  if(speed==='fast')bd.push(`加急交付 <span>+30%</span>`);
  bd.push(`价格浮动范围 <span>±15%</span>`);
  document.getElementById('breakdown').innerHTML=bd.map(b=>'▸ '+b).join('<br>');
}
calc();
</script></body></html>
