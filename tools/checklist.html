<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>上线前安全自检清单 · 柳亭秋</title><style>
:root{--bg:#F8F6F2;--card:#fff;--text:#222;--dim:#666;--border:#E5E5E5;--accent:#333}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);font-family:-apple-system,'PingFang SC','Microsoft YaHei',sans-serif;color:var(--text);line-height:1.6;min-height:100vh}
.container{max-width:700px;margin:0 auto;padding:48px 24px}
h1{font-size:28px;margin-bottom:4px}h1 span{display:block;font-size:14px;color:var(--dim);font-weight:400;margin-top:4px}
.card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:20px 24px;margin-bottom:14px}
.card label{display:block;font-size:14px;font-weight:600;margin-bottom:8px}
.card select{width:100%;height:44px;padding:0 12px;border:1px solid var(--border);border-radius:8px;font-size:15px;font-family:inherit;background:#fff;outline:none}
.check-items{margin-top:12px}
.check-item{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid #f0f0f0;font-size:14px}
.check-item:last-child{border-bottom:none}
.check-item .num{flex-shrink:0;width:24px;height:24px;border-radius:50%;background:var(--accent);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11px;font-weight:700}
.check-item .info{flex:1}
.check-item .info strong{display:block;margin-bottom:2px}
.check-item .info .tip{font-size:12px;color:var(--dim)}
.btn{display:inline-flex;align-items:center;justify-content:center;padding:12px 32px;background:var(--accent);color:#fff;border:none;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;min-height:44px;width:100%;margin-top:16px;transition:all .2s}
.btn:hover{background:#222}
#checklistArea{display:none;margin-top:16px}
#checklistArea.show{display:block}
.footer{text-align:center;padding:32px 0;color:var(--dim);font-size:13px}
.footer a{color:var(--accent);text-decoration:underline}
.note{font-size:12px;color:var(--dim);margin-top:12px;padding:12px;background:#f5f5f5;border-radius:8px}
.print-hint{font-size:12px;color:var(--accent);text-align:center;margin-top:8px}
@media print{.btn,.footer,.note,.card select{display:none}.card{border:none;padding:8px 0;page-break-inside:avoid}}
</style></head><body>
<div class="container">
  <a href="/" style="display:inline-block;margin-bottom:24px;font-size:14px;color:#666;text-decoration:none">← 返回首页</a>
<h1>📋 上线前安全自检清单<span>选择你的项目类型 → 自动生成定制化检查清单 → 打印/保存PDF</span></h1>

<div class="card">
  <label>项目类型</label>
  <select id="projType" onchange="gen()">
    <option value="full">完整网站（前台+后台+API+数据库）</option>
    <option value="static">静态网站（纯HTML/CSS/JS，无后端）</option>
    <option value="api">纯API后端（无前台页面）</option>
  </select>
  <label style="margin-top:16px">部署平台</label>
  <select id="platform" onchange="gen()">
    <option value="aliyun">阿里云 ECS（Windows Server）</option>
    <option value="vercel">Vercel/Netlify（静态托管）</option>
    <option value="vps">Linux VPS（Ubuntu/CentOS）</option>
  </select>
</div>

<div class="card" id="checklistArea">
  <h3 style="margin-bottom:12px">你的定制化检查清单（共 <span id="itemCount">14</span> 项）</h3>
  <div class="check-items" id="items"></div>
  <button class="btn" onclick="window.print()">🖨️ 打印或保存为 PDF</button>
  <p class="print-hint">提示：按 Ctrl+P → 另存为PDF → 即可下载</p>
</div>

<p class="note">⚠️ 这是一个简化版清单生成器。完整版含 14 项详细的检查命令、修复代码示例、自动化测试脚本。联系我获取 <a href="/" style="color:var(--accent)">完整审计服务</a>。</p>

<div class="footer">
  获取完整安全审计 → 📱 15776020826 · 💬 微信 ltqly08260717 · 📧 QQ 3685590323 · <a href="/">柳亭秋官网</a>
</div>
</div>
<script>
const allItems={
  data:[
    {num:1,title:'/data/ 目录禁止公开访问',tip:'请求 /data/users.json 应返回 403，且大小写不敏感'},
    {num:2,title:'密码使用 scrypt 加密存储',tip:'users.json 中 password 格式为 salt:hash（含冒号即为scrypt）'},
    {num:3,title:'JSON 不存储 base64 图片',tip:'所有图片字段必须是文件路径，不能用 data:image/png;base64'},
  ],
  app:[
    {num:4,title:'所有管理 API 鉴权',tip:'GET /api/admin/messages 无Token时应返回 401'},
    {num:5,title:'用户输入写入前 esc() 转义',tip:'检查所有 POST/PUT 端点，每个字符串字段都经过 esc()'},
    {num:6,title:'DELETE 返回真实状态',tip:'删除不存在的ID应返回 404，而非 {success:true}'},
    {num:7,title:'禁止 console.log 输出密码/Token',tip:'搜索项目所有 console.log，确保无敏感信息泄露'},
  ],
  http:[
    {num:8,title:'安全响应头四件套 + CSP',tip:'X-Content-Type-Options/X-Frame-Options/Referrer-Policy/CSP 全部存在'},
    {num:9,title:'路径遍历防护',tip:'fullPath.startsWith(__dirname + path.sep)，非 startsWith(__dirname)'},
    {num:10,title:'请求体大小限制精确',tip:'用 Buffer.byteLength(body) 而非 body.length（中文字节差异3倍）'},
    {num:11,title:'速率限制 + 定期清理',tip:'每IP 60次/分钟，Map 用 setInterval 定时清理过期条目'},
  ],
  deploy:[
    {num:12,title:'无开发残余文件',tip:'删除 test.js/.tmp/node_modules/SOURCE.md 等非交付文件'},
    {num:13,title:'端口在安全组和防火墙双向放行',tip:'阿里云安全组 + Windows防火墙 netsh advfirewall 都要配'},
    {num:14,title:'PM2 守护 + 开机自启',tip:'pm2 save + pm2 startup + 确认环境变量 PORT 正确'},
  ],
  static:[
    {num:1,title:'所有 <img> 有 alt 属性',tip:'图片缺失 alt 时屏幕阅读器无法识别'},
    {num:2,title:'输入框字号 ≥ 16px',tip:'iOS Safari 在聚焦小于16px的输入框时会自动缩放'},
    {num:3,title:'颜色对比度 ≥ 4.5:1',tip:'正文文字与背景对比度需达 WCAG AA 级，可用浏览器 DevTools 检查'},
    {num:4,title:':focus-visible 焦点环不可删除',tip:'键盘用户 Tab 导航依赖焦点环，不能用 outline:none 删除'},
    {num:5,title:'每页独立 meta description + OG 标签',tip:'title/description/og:title/og:description 四个标签每页不同'},
  ]
};

function gen(){
  const type=document.getElementById('projType').value;
  const area=document.getElementById('checklistArea');
  area.classList.add('show');

  let items=[];
  if(type==='full'){items=[...allItems.data,...allItems.app,...allItems.http,...allItems.deploy]}
  else if(type==='static'){items=[...allItems.static]}
  else{items=[...allItems.data,...allItems.app,...allItems.http]}

  // Re-number
  items=items.map((it,i)=>({...it,num:i+1}));

  document.getElementById('itemCount').textContent=items.length;
  document.getElementById('items').innerHTML=items.map(i=>`
    <div class="check-item">
      <span class="num">${i.num}</span>
      <div class="info"><strong>${i.title}</strong><div class="tip">${i.tip}</div></div>
    </div>
  `).join('');
}
gen();
</script></body></html>
