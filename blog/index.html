<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>技术博客 · dev-home</title>
<meta name="description" content="技术博客，深度原创内容。">
<link rel="stylesheet" href="/css/style.css">
<style>
.blog-list{max-width:780px;margin:60px auto;padding:0 24px}
.blog-list h1{text-align:center;margin-bottom:40px}
.blog-item{padding:24px;margin-bottom:12px;background:var(--bg-card);border-radius:var(--radius-md);transition:transform .15s,box-shadow .15s}
.blog-item:hover{transform:translateY(-2px);box-shadow:var(--shadow-md)}
.blog-item h3{margin-bottom:6px}
.blog-item h3 a{color:var(--text-primary);font-size:18px}
.blog-item p{color:var(--text-secondary);font-size:14px;margin-top:4px}
.blog-item-meta{font-size:12px;color:var(--text-muted);margin-bottom:8px}
.blog-item-meta span{margin-right:12px}
.fade-in{opacity:0;transform:translateY(20px);transition:opacity .8s,transform .8s}
.fade-in.visible{opacity:1;transform:translateY(0)}
</style>
</head>
<body>
<div id="mainContent">
<div class="blog-list">
<h1>📝 技术博客</h1>

<p style="text-align:center;color:var(--text-muted)">暂无文章</p>
<div style="text-align:center;margin-top:40px">
  <a href="/daily/">技术日报</a> &nbsp;·&nbsp;
  <a href="/">返回首页</a>
</div>
</div>
</div>
<script>
(()=>{const o=new IntersectionObserver(e=>{e.forEach(e=>{e.isIntersecting&&(e.target.classList.add('visible'),o.unobserve(e.target))})},{threshold:.1});document.querySelectorAll('.fade-in').forEach(e=>o.observe(e))})();
</script>
</body>
</html>
